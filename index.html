<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS 每日学习</title>
<style>
/* === Reset === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; line-height: 1.6; padding: 20px; }
.container { max-width: 800px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }
/* === Buttons === */
.btn { display: inline-block; background: #4a90d9; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
.btn:hover { background: #357abd; }
.btn-secondary { background: #eef1f5; color: #333; }
.btn-secondary:hover { background: #dde1e8; }
.btn-success { background: #52c41a; }
.btn-warning { background: #faad14; color: #fff; }
.btn-danger { background: #ff4d4f; }
.back-link { display: inline-block; margin-bottom: 16px; color: #4a90d9; cursor: pointer; }
/* === Dashboard === */
.header { text-align: center; margin-bottom: 30px; }
.header h1 { font-size: 1.8rem; color: #1a1a2e; }
.header .date { color: #888; font-size: 0.9rem; }
.theme-badge { display: inline-block; background: #4a90d9; color: #fff; padding: 4px 16px; border-radius: 20px; margin-top: 8px; font-size: 0.9rem; }
.progress-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
.progress-card { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; }
.progress-card .icon { font-size: 2rem; margin-bottom: 8px; }
.progress-card .label { font-size: 0.9rem; color: #666; }
.progress-card .count { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; }
.flow-guide { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
.flow-steps { display: flex; gap: 8px; flex-wrap: wrap; }
.flow-step { background: #eef1f5; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; color: #888; }
.flow-step.active { background: #4a90d9; color: #fff; }
.flow-step.completed { background: #52c41a; color: #fff; }
/* === Words === */
.word-card { background: #fff; border-radius: 12px; padding: 24px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
.word-card .word { font-size: 2rem; font-weight: 700; }
.word-card .phonetic { color: #888; font-size: 1rem; }
.word-card .meaning { font-size: 1.1rem; color: #555; margin: 12px 0; }
.word-card .example { font-size: 0.95rem; color: #666; background: #f9f9f9; padding: 12px; border-radius: 8px; }
.word-actions { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
.word-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
.word-chip { padding: 4px 12px; border-radius: 16px; font-size: 0.8rem; background: #eef1f5; color: #888; }
.word-chip.known { background: #e6f7e6; color: #52c41a; }
.word-chip.forgotten { background: #fff2f0; color: #ff4d4f; }
/* === Reading === */
.reading-content { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px; line-height: 1.8; }
.highlight { background: #fff3b0; padding: 1px 4px; border-radius: 3px; cursor: pointer; position: relative; }
.highlight:hover::after { content: attr(data-meaning); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; white-space: nowrap; z-index: 10; }
.question-block { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 12px; }
.question-block p { margin-bottom: 8px; font-weight: 600; }
.question-block label { display: block; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
.question-block label:hover { background: #f0f4ff; }
.question-block input[type="radio"] { margin-right: 8px; }
.question-result { margin-top: 8px; font-size: 0.9rem; }
.question-result.correct { color: #52c41a; }
.question-result.incorrect { color: #ff4d4f; }
/* === Writing === */
.writing-area { width: 100%; min-height: 300px; padding: 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; line-height: 1.6; resize: vertical; margin: 12px 0; }
.writing-tips { background: #fffbe6; padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 12px; }
.feedback-area { background: #f9f9ff; border-radius: 12px; padding: 16px; margin-top: 16px; }
.feedback-item { padding: 6px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
.feedback-item:last-child { border: none; }
.feedback-item .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-right: 8px; }
.tag-good { background: #e6f7e6; color: #52c41a; }
.tag-warn { background: #fff7e6; color: #faad14; }
.tag-suggest { background: #e6f0ff; color: #4a90d9; }
/* === Speaking === */
.part-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.part-tab { padding: 8px 16px; border-radius: 8px 8px 0 0; background: #eef1f5; cursor: pointer; font-size: 0.85rem; }
.part-tab.active { background: #fff; font-weight: 600; border-bottom: 2px solid #4a90d9; }
/* === Progress bar === */
.progress-bar-bg { background: #eef1f5; border-radius: 10px; height: 8px; margin: 8px 0 16px; overflow: hidden; }
.progress-bar-fill { background: #4a90d9; height: 100%; border-radius: 10px; transition: width 0.3s; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// Pages: dashboard, words, reading, writing, speaking
const state = {
  currentThemeIndex: 0,
  currentPage: 'dashboard',
  wordIndex: 0,
  speakingPart: 'part1',
  savedDrafts: {}
};

const DAY_MS = 86400000;

// 数据远程加载地址：设为 '' 表示同目录（配合本地服务器使用）
// 未来可改为 GitHub Raw URL 实现自动更新题库
const DATA_URL = '';
const CACHE_KEY = 'ielts_data_cache';
const CACHE_VERSION_KEY = 'ielts_data_version';

let contentData = { themes: [] };

function dataPath(path) {
  return DATA_URL + path;
}

async function loadData() {
  const app = document.getElementById('app');
  app.innerHTML = '<div style="text-align:center;padding:60px 0;"><div style="font-size:3rem;margin-bottom:16px;">⏳</div><div>正在加载学习数据...</div></div>';

  try {
    const themesRes = await fetch(dataPath('content/themes.json'));
    const themesData = await themesRes.json();
    const cached = localStorage.getItem(CACHE_KEY);
    const cachedVer = localStorage.getItem(CACHE_VERSION_KEY);

    if (cached && cachedVer === themesData.lastUpdated) {
      contentData = JSON.parse(cached);
      return;
    }

    contentData.themes = themesData.themes;
    for (const theme of contentData.themes) {
      const res = await fetch(dataPath('content/' + theme.id + '/data.json'));
      contentData[theme.id] = await res.json();
    }

    localStorage.setItem(CACHE_KEY, JSON.stringify(contentData));
    localStorage.setItem(CACHE_VERSION_KEY, themesData.lastUpdated);
  } catch (e) {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      contentData = JSON.parse(cached);
      console.warn('使用缓存数据（网络加载失败）');
    } else {
      app.innerHTML = '<div style="text-align:center;padding:60px 0;color:#ff4d4f;"><div style="font-size:3rem;margin-bottom:16px;">⚠️</div><div>数据加载失败，请确保通过本地服务器或远程 URL 访问</div></div>';
      throw e;
    }
  }
}

const synonyms = {
  "important": ["crucial", "vital", "essential", "significant", "paramount"],
  "good": ["beneficial", "advantageous", "favorable", "valuable"],
  "bad": ["detrimental", "harmful", "adverse", "negative"],
  "big": ["substantial", "considerable", "significant", "immense"],
  "small": ["minor", "trivial", "insignificant", "negligible"],
  "many": ["numerous", "countless", "a multitude of", "a plethora of"],
  "show": ["demonstrate", "illustrate", "indicate", "reveal", "exhibit"],
  "help": ["facilitate", "aid", "assist", "enable"],
  "change": ["transform", "modify", "alter", "shift"],
  "improve": ["enhance", "strengthen", "refine", "upgrade"],
  "cause": ["lead to", "result in", "contribute to", "give rise to"],
  "think": ["believe", "consider", "deem", "hold the view that"],
  "need": ["require", "necessitate", "call for"],
  "use": ["utilize", "employ", "make use of"],
  "get": ["obtain", "acquire", "attain", "secure"]
};

function getTodayTheme() {
  const saved = localStorage.getItem('ielts_theme_index');
  const savedDate = localStorage.getItem('ielts_theme_date');
  const today = new Date().toDateString();
  if (saved && savedDate === today) {
    state.currentThemeIndex = parseInt(saved);
  } else {
    const stored = localStorage.getItem('ielts_progress');
    if (stored) {
      const progress = JSON.parse(stored);
      state.currentThemeIndex = progress.lastThemeIndex || 0;
    }
    localStorage.setItem('ielts_theme_index', state.currentThemeIndex);
    localStorage.setItem('ielts_theme_date', today);
  }
  return contentData.themes[state.currentThemeIndex];
}

function getThemeData() {
  const theme = getTodayTheme();
  if (!theme || !contentData[theme.id]) {
    showPage('dashboard');
    return null;
  }
  return contentData[theme.id];
}

function loadProgress() {
  const stored = localStorage.getItem('ielts_progress');
  if (stored) return JSON.parse(stored);
  const theme = getTodayTheme();
  const p = {
    lastThemeIndex: 0,
    themes: {}
  };
  p.themes[theme.id] = { words: [], speakingFavorites: [], writingDraft: '' };
  return p;
}

function saveProgress(progress) {
  localStorage.setItem('ielts_progress', JSON.stringify(progress));
}

function getThemeProgress(progress) {
  const theme = getTodayTheme();
  if (!progress.themes[theme.id]) {
    progress.themes[theme.id] = { words: [], speakingFavorites: [], writingDraft: '' };
  }
  return progress.themes[theme.id];
}

function showPage(pageId) {
  state.currentPage = pageId;
  document.getElementById('app').innerHTML = '';
  switch (pageId) {
    case 'dashboard': renderDashboard(); break;
    case 'words': renderWords(); break;
    case 'reading': renderReading(); break;
    case 'writing': renderWriting(); break;
    case 'speaking': renderSpeaking(); break;
  }
}

function renderDashboard() {
  const theme = getTodayTheme();
  if (!theme) return;
  const progress = loadProgress();
  const tp = getThemeProgress(progress);
  const app = document.getElementById('app');
  
  const wordCount = theme.wordsCount || 40;
  const knownCount = tp.words.filter(w => w === 'known').length;
  const wordProgress = Math.round((knownCount / wordCount) * 100);
  const readingDone = tp.readingDone ? 1 : 0;
  const writingDone = tp.writingDone ? 1 : 0;
  const speakingDone = tp.speakingDone ? 1 : 0;
  
  const flowSteps = [
    { id: 'words', label: '① 单词学习', done: knownCount >= wordCount },
    { id: 'reading', label: '② 文章阅读', done: tp.readingDone },
    { id: 'writing', label: '③ 写作练习', done: tp.writingDone },
    { id: 'speaking', label: '④ 口语答题', done: tp.speakingDone }
  ];
  
  let activeStep = flowSteps.findIndex(s => !s.done);
  if (activeStep === -1) activeStep = 3;
  
  app.innerHTML = `
    <div class="header">
      <h1>IELTS 每日学习</h1>
      <div class="date">${new Date().toLocaleDateString('zh-CN')}</div>
      <div class="theme-badge">今日主题：${theme.title} ${theme.titleCn}</div>
    </div>
    <div class="flow-guide">
      <h3>📋 今日学习流程</h3>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${Math.round((flowSteps.filter(s=>s.done).length/4)*100)}%"></div>
      </div>
      <div class="flow-steps">
        ${flowSteps.map((s, i) => `<div class="flow-step ${i === activeStep && !s.done ? 'active' : ''} ${s.done ? 'completed' : ''}">${s.label}</div>`).join('')}
      </div>
    </div>
    <div class="progress-grid">
      <div class="progress-card" onclick="showPage('words')">
        <div class="icon">📖</div>
        <div class="label">单词</div>
        <div class="count">${knownCount}/${theme.wordsCount}</div>
      </div>
      <div class="progress-card" onclick="showPage('reading')">
        <div class="icon">📰</div>
        <div class="label">阅读</div>
        <div class="count">${readingDone ? '✅ 已完成' : '📝 未开始'}</div>
      </div>
      <div class="progress-card" onclick="showPage('writing')">
        <div class="icon">✍️</div>
        <div class="label">写作</div>
        <div class="count">${writingDone ? '✅ 已完成' : '📝 未开始'}</div>
      </div>
      <div class="progress-card" onclick="showPage('speaking')">
        <div class="icon">🎤</div>
        <div class="label">口语</div>
        <div class="count">${speakingDone ? '✅ 已完成' : '📝 未开始'}</div>
      </div>
    </div>
    <div style="text-align:center;margin-top:8px;">
      <button class="btn" onclick="showPage('${flowSteps[activeStep].id}')">${flowSteps[activeStep].done ? '继续学习' : '开始 ' + flowSteps[activeStep].label}</button>
    </div>
  `;
}

function renderWords() {
  const theme = getTodayTheme();
  const data = getThemeData();
  const progress = loadProgress();
  const tp = getThemeProgress(progress);
  const app = document.getElementById('app');
  
  let idx = state.wordIndex;
  const words = data.words;
  if (idx >= words.length) idx = 0;
  const word = words[idx];
  const status = tp.words[idx] || 'new';
  
  app.innerHTML = `
    <div class="back-link" onclick="showPage('dashboard')">← 返回仪表盘</div>
    <h2 style="margin-bottom:8px;">📖 单词学习</h2>
    <div style="color:#888;font-size:0.9rem;margin-bottom:4px;">${theme.title} — 第 ${idx + 1}/${words.length} 个</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${Math.round((idx + 1) / words.length * 100)}%"></div>
    </div>
    <div class="word-card">
      <div class="word">${word.word}</div>
      <div class="phonetic">${word.phonetic}</div>
      <div class="meaning">${word.meaning}</div>
      <div class="example">${word.example}<br><span style="color:#999;font-size:0.85rem;">${word.exampleCn}</span></div>
      <div class="word-actions">
        <button class="btn btn-success" onclick="markWord(${idx}, 'known')">✅ 知道</button>
        <button class="btn btn-warning" onclick="markWord(${idx}, 'blurry')">🤔 模糊</button>
        <button class="btn btn-danger" onclick="markWord(${idx}, 'forgotten')">❌ 不认识</button>
      </div>
    </div>
    <div><strong>今日词汇列表</strong></div>
    <div class="word-list">
      ${words.map((w, i) => {
        const s = tp.words[i] || 'new';
        const cls = s === 'known' ? 'known' : (s === 'forgotten' ? 'forgotten' : '');
        return `<div class="word-chip ${cls}" onclick="jumpToWord(${i})">${w.word}</div>`;
      }).join('')}
    </div>
  `;
}

function markWord(idx, status) {
  const progress = loadProgress();
  const tp = getThemeProgress(progress);
  tp.words[idx] = status;
  saveProgress(progress);
  
  const data = getThemeData();
  const knownCount = tp.words.filter(w => w === 'known').length;
  const totalCount = data.words.length;
  
  if (knownCount >= totalCount) {
    showPage('dashboard');
    return;
  }
  
  let nextIdx = idx + 1;
  while (nextIdx < totalCount && tp.words[nextIdx] === 'known') nextIdx++;
  if (nextIdx >= totalCount) {
    nextIdx = tp.words.findIndex((s, i) => s === 'blurry' || s === 'forgotten');
    if (nextIdx === -1) {
      showPage('dashboard');
      return;
    }
  }
  state.wordIndex = nextIdx;
  renderWords();
}

function jumpToWord(idx) {
  state.wordIndex = idx;
  renderWords();
}

function renderReading() {
  const data = getThemeData();
  const progress = loadProgress();
  const tp = getThemeProgress(progress);
  const app = document.getElementById('app');
  
  let content = data.reading.content;
  data.words.forEach(w => {
    const regex = new RegExp(`\\*\\*${w.word}\\*\\*`, 'gi');
    content = content.replace(regex, `<span class="highlight" data-meaning="${w.meaning}">${w.word}</span>`);
  });
  content = content.replace(/\*\*/g, '');
  
  app.innerHTML = `
    <div class="back-link" onclick="showPage('dashboard')">← 返回仪表盘</div>
    <h2 style="margin-bottom:4px;">📰 阅读练习</h2>
    <div style="color:#888;font-size:0.9rem;margin-bottom:16px;">${data.reading.title}</div>
    <div class="reading-content">${content.replace(/\n/g, '<br>')}</div>
    <h3 style="margin-bottom:12px;">📝 阅读理解</h3>
    ${data.readingQuestions.map((q, qi) => `
      <div class="question-block" id="q-${qi}">
        <p>${qi + 1}. ${q.question}</p>
        ${q.options.map((o, oi) => `
          <label><input type="radio" name="q-${qi}" value="${oi}" onchange="checkReadingAnswer(${qi}, ${oi}, ${q.correct})"> ${o}</label>
        `).join('')}
        <div class="question-result" id="qr-${qi}"></div>
      </div>
    `).join('')}
    <div style="text-align:center;margin:20px 0;">
      <button class="btn" onclick="markReadingDone()">✅ 完成阅读</button>
    </div>
  `;
}

function checkReadingAnswer(qi, selected, correct) {
  const el = document.getElementById('qr-' + qi);
  if (selected === correct) {
    el.className = 'question-result correct';
    el.textContent = '✅ 正确！';
  } else {
    el.className = 'question-result incorrect';
    el.textContent = '❌ 不正确，再想想';
  }
}

function markReadingDone() {
  const progress = loadProgress();
  const tp = getThemeProgress(progress);
  tp.readingDone = true;
  saveProgress(progress);
  showPage('dashboard');
}

function renderWriting() {
  const data = getThemeData();
  const progress = loadProgress();
  const tp = getThemeProgress(progress);
  const app = document.getElementById('app');
  
  app.innerHTML = `
    <div class="back-link" onclick="showPage('dashboard')">← 返回仪表盘</div>
    <h2 style="margin-bottom:4px;">✍️ 写作练习</h2>
    <div style="color:#888;font-size:0.9rem;margin-bottom:8px;">${data.writing.task} — ${data.writing.type} — 建议用时：${data.writing.time}</div>
    <div class="reading-content" style="background:#f0f4ff;">
      <strong>📌 题目：</strong><br>${data.writing.prompt}
    </div>
    <div class="writing-tips">
      <strong>💡 写作提示：</strong>
      <ul style="margin:8px 0 0 20px;">
        ${data.writing.tips.map(t => `<li>${t}</li>`).join('')}
      </ul>
    </div>
    <div class="writing-tips" style="background:#e6f7e6;">
      <strong>📝 建议使用今日词汇：</strong> ${data.writing.suggestedVocab.join('、')}
    </div>
    <textarea class="writing-area" id="writing-text" placeholder="在此写作文..." oninput="updateWordCount()">${tp.writingDraft || ''}</textarea>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span id="word-count">字数：${countWords(tp.writingDraft || '')}/250</span>
      <div>
        <button class="btn btn-secondary" onclick="saveWritingDraft()">💾 保存草稿</button>
        <button class="btn" onclick="checkWriting()">🔍 检查作文</button>
      </div>
    </div>
    <div class="feedback-area" id="writing-feedback" style="display:none;"></div>
    <div style="text-align:center;margin-top:12px;">
      <button class="btn btn-success" onclick="markWritingDone()">✅ 完成写作</button>
    </div>
  `;
  updateWordCount();
}

function countWords(text) {
  const cleaned = text.replace(/[^a-zA-Z\s]/g, '').trim();
  if (!cleaned) return 0;
  return cleaned.split(/\s+/).length;
}

function updateWordCount() {
  const text = document.getElementById('writing-text').value;
  const count = countWords(text);
  document.getElementById('word-count').textContent = `字数：${count}/250`;
}

function saveWritingDraft() {
  const text = document.getElementById('writing-text').value;
  const progress = loadProgress();
  const tp = getThemeProgress(progress);
  tp.writingDraft = text;
  saveProgress(progress);
  alert('草稿已保存！');
}

function checkWriting() {
  const text = document.getElementById('writing-text').value;
  const data = getThemeData();
  const words = text.toLowerCase().split(/\s+/);
  const feedback = document.getElementById('writing-feedback');
  
  const usedVocab = data.writing.suggestedVocab.filter(v => words.includes(v));
  const vocabScore = usedVocab.length >= 3 ? 'good' : 'warn';
  const vocabFeedback = usedVocab.length > 0
    ? `使用了 ${usedVocab.length} 个推荐词汇：${usedVocab.join('、')}`
    : '未使用推荐词汇，建议尝试使用今日学到的词汇';
  
  const commonWords = Object.keys(synonyms);
  const replaceable = commonWords.filter(w => words.includes(w));
  const synonymSuggestions = replaceable.map(w => {
    const [first] = synonyms[w];
    return `"${w}" → "${first}"`;
  });
  
  const hasIntro = /\b(introduction|firstly|first of all|in my opinion|i believe|generally)\b/i.test(text);
  const hasBody = /\b(secondly|furthermore|moreover|in addition|on the one hand|on the other hand)\b/i.test(text);
  const hasConclusion = /\b(conclusion|in conclusion|to conclude|to sum up|in summary|overall)\b/i.test(text);
  const structureItems = [];
  if (hasIntro) structureItems.push({ tag: 'tag-good', text: '✅ 有开头段' });
  else structureItems.push({ tag: 'tag-warn', text: '⚠️ 缺少明确的开头段' });
  if (hasBody) structureItems.push({ tag: 'tag-good', text: '✅ 有主体段落标记' });
  else structureItems.push({ tag: 'tag-warn', text: '⚠️ 建议使用过渡词连接观点' });
  if (hasConclusion) structureItems.push({ tag: 'tag-good', text: '✅ 有结尾段' });
  else structureItems.push({ tag: 'tag-warn', text: '⚠️ 缺少明确的结尾段' });
  
  const wordCount = countWords(text);
  
  feedback.style.display = 'block';
  feedback.innerHTML = `
    <h4>📋 检查反馈</h4>
    <div class="feedback-item"><span class="tag tag-${vocabScore}">词汇</span> ${vocabFeedback}</div>
    <div class="feedback-item">
      <span class="tag tag-suggest">替换建议</span>
      ${synonymSuggestions.length > 0 ? synonymSuggestions.slice(0, 3).join('；') : '没有检测到需要替换的常用词，很棒！'}
    </div>
    <div class="feedback-item">
      <span class="tag tag-${wordCount >= 250 ? 'good' : 'warn'}">字数</span>
      ${wordCount >= 250 ? `✅ ${wordCount} 词，已达要求` : `⚠️ ${wordCount}/250 词，还需补充`}
    </div>
    ${structureItems.map(item => `<div class="feedback-item"><span class="${item.tag}">结构</span> ${item.text}</div>`).join('')}
  `;
}

function markWritingDone() {
  const progress = loadProgress();
  const tp = getThemeProgress(progress);
  tp.writingDone = true;
  saveProgress(progress);
  showPage('dashboard');
}

function renderSpeaking() {
  const data = getThemeData();
  const progress = loadProgress();
  const tp = getThemeProgress(progress);
  const app = document.getElementById('app');
  
  const parts = ['part1', 'part2', 'part3'];
  const partLabels = ['Part 1 问答', 'Part 2 话题描述', 'Part 3 深入讨论'];
  
  app.innerHTML = `
    <div class="back-link" onclick="showPage('dashboard')">← 返回仪表盘</div>
    <h2 style="margin-bottom:4px;">🎤 口语练习</h2>
    <div style="color:#888;font-size:0.9rem;margin-bottom:16px;">最新题库：2026 年 6 月</div>
    <div class="part-tabs">
      ${parts.map((p, i) => `<div class="part-tab ${p === state.speakingPart ? 'active' : ''}" onclick="switchSpeakingPart('${p}')">${partLabels[i]}</div>`).join('')}
    </div>
    <div id="speaking-content"></div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-success" onclick="markSpeakingDone()">✅ 完成口语练习</button>
    </div>
  `;
  renderSpeakingPart();
}

function switchSpeakingPart(part) {
  state.speakingPart = part;
  renderSpeakingPart();
}

function renderSpeakingPart() {
  const data = getThemeData();
  const container = document.getElementById('speaking-content');
  const part = state.speakingPart;
  
  if (part === 'part1' || part === 'part3') {
    const questions = data.speaking[part];
    const listKey = part + 'Idx';
    if (state[listKey] === undefined) state[listKey] = 0;
    const qi = state[listKey];
    const q = questions[qi];
    
    container.innerHTML = `
      <div class="reading-content" style="background:#f9f9ff;">
        <strong>🎯 问题：</strong><br>${q.question}
      </div>
      <textarea class="writing-area" style="min-height:120px;" id="speaking-answer" placeholder="输入你的回答..."></textarea>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="btn" onclick="checkSpeaking()">🔍 检查回答</button>
        <button class="btn btn-secondary" onclick="showSpeakingReference()">💡 看参考回答</button>
        <button class="btn btn-secondary" onclick="nextSpeakingQuestion('${part}')">➡️ 下一题</button>
      </div>
      <div id="speaking-reference" style="display:none;" class="reading-content">
        <strong>✨ 参考回答：</strong><br>${q.reference}
      </div>
      <div id="speaking-feedback" style="display:none;" class="speaking-feedback"></div>
    `;
  } else {
    const q = data.speaking.part2;
    container.innerHTML = `
      <div class="reading-content" style="background:#f9f9ff;">
        <strong>🎯 题目：</strong><br>${q.prompt.replace(/\n/g, '<br>')}
        <div style="margin-top:8px;font-size:0.85rem;color:#888;">准备时间：1 分钟 | 回答时间：1-2 分钟</div>
      </div>
      <textarea class="writing-area" style="min-height:200px;" id="speaking-answer" placeholder="输入你的回答..."></textarea>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="btn" onclick="checkSpeaking()">🔍 检查回答</button>
        <button class="btn btn-secondary" onclick="showSpeakingReference()">💡 看参考回答</button>
      </div>
      <div id="speaking-reference" style="display:none;" class="reading-content">
        <strong>✨ 参考回答：</strong><br>${q.reference}
      </div>
      <div id="speaking-feedback" style="display:none;" class="speaking-feedback"></div>
    `;
  }
}

function checkSpeaking() {
  const text = document.getElementById('speaking-answer').value.trim();
  const data = getThemeData();
  const words = text.toLowerCase().split(/\s+/);
  const fb = document.getElementById('speaking-feedback');
  
  if (!text) {
    fb.style.display = 'block';
    fb.innerHTML = '<div class="feedback-item">⚠️ 请先输入你的回答</div>';
    return;
  }
  
  const usedVocab = data.words.filter(w => words.includes(w.word));
  const vocabItems = usedVocab.length > 0
    ? `<div class="feedback-item"><span class="tag tag-good">词汇</span> 使用了 ${usedVocab.length} 个今日词汇：${usedVocab.map(w => w.word).join('、')}</div>`
    : `<div class="feedback-item"><span class="tag tag-warn">词汇</span> 建议使用今天学到的词汇</div>`;
  
  const errors = [];
  if (/\bi thinks?\b/i.test(text)) errors.push('"I thinks" → 应该是 "I think"');
  if (/\bhe don't\b/i.test(text)) errors.push('"he don\'t" → 应该是 "he doesn\'t"');
  if (/\bpeoples\b/i.test(text)) errors.push('"peoples" → 应该是 "people"');
  if (/\bthe government\s+they\b/i.test(text)) errors.push('"the government they" → 删除 "they"');
  if (/\bvery much (important|good|bad|big|small)\b/i.test(text)) errors.push('"very much" + adj → 应改为 "very" + adj');
  
  const grammarSection = errors.length > 0
    ? errors.map(e => `<div class="feedback-item"><span class="tag tag-warn">语法</span> ${e}</div>`).join('')
    : '<div class="feedback-item"><span class="tag tag-good">语法</span> 没有检测到常见错误</div>';
  
  const wordCount = text.split(/\s+/).length;
  const structureTips = [];
  if (wordCount < 50) structureTips.push('回答较短，建议补充具体例子');
  
  fb.style.display = 'block';
  fb.innerHTML = `
    <h4>📋 口语反馈</h4>
    ${vocabItems}
    ${grammarSection}
    ${structureTips.map(t => `<div class="feedback-item"><span class="tag tag-suggest">建议</span> ${t}</div>`).join('')}
    <div class="feedback-item">
      <span class="tag tag-suggest">参考表达</span> 
      可以将 "I think" 替换为 "I believe"、"In my opinion"、"From my perspective"
    </div>
  `;
}

function showSpeakingReference() {
  document.getElementById('speaking-reference').style.display = 'block';
}

function nextSpeakingQuestion(part) {
  const data = getThemeData();
  const questions = data.speaking[part];
  const key = part + 'Idx';
  if (state[key] === undefined) state[key] = 0;
  state[key] = (state[key] + 1) % questions.length;
  renderSpeakingPart();
}

function markSpeakingDone() {
  const progress = loadProgress();
  const tp = getThemeProgress(progress);
  tp.speakingDone = true;
  saveProgress(progress);
  showPage('dashboard');
}

document.addEventListener('DOMContentLoaded', async () => {
  try {
    await loadData();
    showPage('dashboard');
  } catch (e) {
    // 错误已经由 loadData 显示
  }
});
</script>
</body>
</html>
